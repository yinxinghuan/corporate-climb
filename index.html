<!DOCTYPE html>
<html lang="en">
<head>
<meta name="game-uuid" content="76c220c2-2340-497d-ada7-41108d25efbf" />
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover" />
<title>Corporate Climb</title>
<script src="./aigram-bridge.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Archivo:wght@500;600;700;800;900&display=swap" rel="stylesheet" />
<style>
  :root {
    --ink:#eef2fb;            /* light text on dark */
    --ink-soft:#9aa7c2;       /* muted label */
    --gold:#ffce4a;
    --gold-deep:#f2a93a;
    --teal:#46cdbf;
    --red:#ff5a63;
    --navy-1:#0c1322; --navy-2:#16213a; --amber:#6b4a3e;
    --glass:linear-gradient(150deg, rgba(40,52,82,.72), rgba(22,31,54,.6));
    --glass-strong:linear-gradient(155deg, rgba(46,60,94,.92), rgba(24,33,58,.84));
    --glass-border:rgba(150,170,220,.22);
    --glass-shadow:0 14px 40px rgba(0,0,0,.5), inset 0 1px 0 rgba(180,200,255,.12);
    --blur:saturate(150%) blur(16px);
    --font:"Archivo","PingFang SC",system-ui,-apple-system,sans-serif;
  }
  * { box-sizing:border-box; }
  html, body {
    margin:0; height:100%; overflow:hidden;
    background:linear-gradient(180deg, var(--navy-1) 0%, var(--navy-2) 52%, var(--amber) 100%);
    font-family:var(--font);
    -webkit-user-select:none; user-select:none; -webkit-touch-callout:none;
    -webkit-tap-highlight-color:transparent;
  }
  #wrap { position:fixed; inset:0; overflow:hidden; }
  #c { display:block; width:100%; height:100%; touch-action:none; }

  .hud { position:fixed; pointer-events:none; z-index:5; }

  /* ── Wordmark — stacked brand title, title state only ── */
  #wordmark {
    top:max(82px,calc(env(safe-area-inset-top) + 64px)); left:50%;
    transform:translateX(-50%);
    width:max-content; max-width:94vw;
    text-align:center; line-height:1;
    transition:opacity .4s ease, transform .4s ease;
  }
  #wordmark .b {
    display:block; font-weight:900; font-size:64px; line-height:.9; letter-spacing:-.01em;
    text-transform:uppercase;
    background:linear-gradient(168deg, #fff 4%, var(--gold) 54%, var(--gold-deep) 100%);
    -webkit-background-clip:text; background-clip:text; color:transparent;
    filter:drop-shadow(0 4px 14px rgba(0,0,0,.5));
  }
  #wordmark .sub {
    display:block; font-weight:600; font-size:13px; letter-spacing:.3em;
    color:var(--ink-soft); margin-top:12px; text-transform:uppercase; padding-left:.3em;
  }
  #wordmark.hidden { opacity:0; transform:translate(-50%,-16px); }

  /* ── Score (floor reached) — big number, center top ── */
  #score {
    top:max(22px,calc(env(safe-area-inset-top) + 10px)); left:50%; transform:translateX(-50%);
    font-weight:900; color:#fff; font-size:62px; line-height:1;
    font-variant-numeric:tabular-nums; letter-spacing:.01em;
    text-shadow:0 2px 2px rgba(0,0,0,.5), 0 8px 26px rgba(0,0,0,.6);
    opacity:0; transition:opacity .3s ease;
  }
  #score.show { opacity:1; }
  #score.bump { animation:cc-bump .3s cubic-bezier(.3,1.5,.5,1); }
  @keyframes cc-bump { 0%{transform:translateX(-50%) scale(1.2);} 100%{transform:translateX(-50%) scale(1);} }

  /* ── Title pill (current rank) — under the score ── */
  #title {
    top:calc(max(22px,calc(env(safe-area-inset-top) + 10px)) + 70px); left:50%;
    transform:translateX(-50%) translateY(4px);
    font-weight:800; font-size:14px; letter-spacing:.16em; line-height:1; color:#0c1322;
    background:linear-gradient(150deg, var(--gold), var(--gold-deep));
    border:1px solid rgba(255,255,255,.4);
    box-shadow:0 6px 18px rgba(0,0,0,.4), inset 0 1px 0 rgba(255,255,255,.5);
    padding:7px 15px; border-radius:999px; text-transform:uppercase;
    opacity:0; transition:opacity .25s ease, transform .25s ease;
  }
  #title.show { opacity:1; transform:translateX(-50%) translateY(0); }
  #title.pop { animation:cc-titlepop .42s cubic-bezier(.3,1.6,.5,1); }
  @keyframes cc-titlepop { from{transform:translateX(-50%) scale(.5);} to{transform:translateX(-50%) scale(1);} }

  /* ── Combo pill — under the title when ≥2 ── */
  #combo {
    top:calc(max(22px,calc(env(safe-area-inset-top) + 10px)) + 108px); left:50%;
    transform:translateX(-50%) translateY(4px);
    font-weight:700; font-size:13px; letter-spacing:.1em; line-height:1; color:var(--teal);
    background:var(--glass); -webkit-backdrop-filter:var(--blur); backdrop-filter:var(--blur);
    border:1px solid var(--glass-border); box-shadow:0 6px 16px rgba(0,0,0,.34);
    padding:6px 13px; border-radius:999px;
    opacity:0; transition:opacity .22s ease, transform .22s ease;
  }
  #combo.show { opacity:1; transform:translateX(-50%) translateY(0); }
  #combo.pop { animation:cc-combopop .34s cubic-bezier(.3,1.6,.5,1); }
  @keyframes cc-combopop { from{transform:translateX(-50%) scale(.6);} to{transform:translateX(-50%) scale(1);} }

  /* ── Floating per-stomp call — sits high (just under the HUD chips) so it never
        covers the next coworker + their arrow in the mid-screen action zone ── */
  #pop {
    top:23%; left:50%; transform:translate(-50%,-50%);
    text-align:center; white-space:nowrap; opacity:0;
  }
  /* solid white "shout" with a clean soft edge + a per-tone coloured glow. Font size
     is responsive (vw) so long calls like STEAMROLLED!/SR. MANAGER never spill off the
     sides of a narrow phone. */
  #pop .m {
    display:block; font-weight:800; font-size:clamp(23px, 8vw, 40px); line-height:1;
    letter-spacing:.012em; text-transform:uppercase; white-space:nowrap; color:#fff;
    text-shadow:0 1px 0 var(--pop-edge,#0b1020), 0 2px 7px rgba(0,0,0,.6), 0 0 17px var(--pop-glow,rgba(255,255,255,.5));
  }
  /* the quip sits in a frosted memo pill so the sentence reads cleanly */
  #pop .s {
    display:inline-block; margin-top:11px; font-weight:600; font-size:13.5px; letter-spacing:.01em;
    color:#eef2fb; white-space:normal; max-width:78vw;
    background:rgba(12,18,32,.72); border:1px solid rgba(150,170,220,.26);
    padding:6px 13px; border-radius:999px;
    -webkit-backdrop-filter:blur(6px); backdrop-filter:blur(6px);
    box-shadow:0 8px 20px rgba(0,0,0,.42);
  }
  #pop .s:empty { display:none; }
  #pop.tone-perfect { --pop-glow:rgba(255,200,60,.95); --pop-edge:#5a3a06; }
  #pop.tone-good    { --pop-glow:rgba(70,205,191,.9);  --pop-edge:#073a35; }
  #pop.tone-good .m { font-size:clamp(20px, 6.4vw, 32px); }
  #pop.tone-miss    { --pop-glow:rgba(255,90,99,.95);  --pop-edge:#3a0b10; }
  #pop.tone-miss .m { font-size:clamp(20px, 6.4vw, 32px); }
  #pop.tone-promote { --pop-glow:rgba(255,110,210,.95); --pop-edge:#3a0a2e; }
  #pop.tone-promote .m { font-size:clamp(21px, 7vw, 36px); }
  #pop.go { animation:cc-pop 1.5s ease-out; }
  @keyframes cc-pop {
    0%{opacity:0; transform:translate(-50%,-50%) scale(.6);}
    12%{opacity:1; transform:translate(-50%,-60%) scale(1.14);}
    22%{opacity:1; transform:translate(-50%,-66%) scale(1.0);}
    74%{opacity:1; transform:translate(-50%,-76%) scale(1.0);}
    100%{opacity:0; transform:translate(-50%,-104%) scale(.98);}
  }

  /* ── Guide — finger tap hint ── */
  #guide {
    bottom:calc(20% + env(safe-area-inset-bottom)); left:50%; transform:translateX(-50%);
    display:flex; flex-direction:column; align-items:center; gap:14px;
    opacity:0; transition:opacity .45s ease;
  }
  #guide.show { opacity:1; }
  #guide .g-finger { position:relative; width:56px; height:56px; transform-origin:50% 24%; animation:g-tap 1.1s ease-in-out infinite; }
  #guide .g-finger svg { width:100%; height:100%; display:block; fill:rgba(255,255,255,.96); filter:drop-shadow(0 2px 6px rgba(0,0,0,.5)); }
  #guide .g-ripple { position:absolute; left:46%; top:26%; width:20px; height:20px; margin:-10px 0 0 -10px; border-radius:50%; border:2px solid rgba(255,255,255,.85); box-shadow:0 0 12px rgba(255,255,255,.5); animation:g-ripple 1.1s ease-out infinite; }
  #guide .g-label { font-weight:700; font-size:16px; letter-spacing:.05em; color:#fff; text-shadow:0 2px 8px rgba(0,0,0,.6); text-transform:uppercase; }
  @keyframes g-tap { 0%,100%{transform:translateY(-4px) scale(1);} 46%,60%{transform:translateY(3px) scale(.92);} }
  @keyframes g-ripple { 0%,24%{transform:scale(.5); opacity:0;} 40%{opacity:.85;} 100%{transform:scale(2.4); opacity:0;} }

  /* ── Game over card ── */
  #over { position:fixed; inset:0; display:none; align-items:center; justify-content:center; background:rgba(6,10,20,.6); -webkit-backdrop-filter:blur(4px); backdrop-filter:blur(4px); z-index:30; padding:24px; pointer-events:auto; }
  #over.show { display:flex; animation:cc-fade .25s ease; }
  @keyframes cc-fade { from{opacity:0;} to{opacity:1;} }
  #over .card {
    text-align:center; max-width:330px; width:100%;
    background:var(--glass-strong); -webkit-backdrop-filter:var(--blur); backdrop-filter:var(--blur);
    color:var(--ink); border:1px solid var(--glass-border); border-radius:26px;
    box-shadow:var(--glass-shadow), 0 24px 60px rgba(0,0,0,.55);
    padding:30px 26px 26px; display:flex; flex-direction:column; align-items:center;
    animation:cc-rise .34s cubic-bezier(.2,1.1,.4,1);
  }
  @keyframes cc-rise { from{transform:translateY(18px) scale(.96); opacity:0;} to{transform:none; opacity:1;} }
  #over .pink { font-weight:700; font-size:11px; letter-spacing:.24em; color:var(--red); text-transform:uppercase; margin:0 0 6px; }
  #over h1 { font-weight:900; font-size:clamp(28px,9vw,38px); color:#fff; margin:0 0 4px; letter-spacing:-.01em; line-height:1.04; text-transform:uppercase; }
  #over .reached { font-weight:600; font-size:14px; color:var(--ink-soft); margin:0 0 18px; }
  #over .reached b { color:var(--gold); }
  #over .rows { display:flex; gap:14px; justify-content:center; width:100%; }
  #over .stat { flex:1; display:flex; flex-direction:column; align-items:center; gap:3px; background:rgba(255,255,255,.06); border:1px solid rgba(150,170,220,.2); border-radius:18px; padding:12px 8px; }
  #over .stat .k { font-weight:700; font-size:10px; letter-spacing:.16em; color:var(--ink-soft); text-transform:uppercase; }
  #over .stat .v { font-weight:900; font-size:40px; color:#fff; font-variant-numeric:tabular-nums; line-height:1; }
  #over .stat.best .v { background:linear-gradient(150deg, var(--gold), var(--gold-deep)); -webkit-background-clip:text; background-clip:text; color:transparent; }
  #over .btns { display:flex; flex-direction:column; gap:10px; width:100%; margin-top:22px; }
  .btn-cta, .btn-ghost { pointer-events:auto; width:100%; min-height:48px; border-radius:999px; font-family:var(--font); font-weight:800; letter-spacing:.04em; cursor:pointer; -webkit-tap-highlight-color:transparent; border:none; text-transform:uppercase; transition:transform .12s ease, box-shadow .12s ease, background .2s ease; }
  .btn-cta { font-size:18px; color:#0c1322; background:linear-gradient(150deg, var(--gold), var(--gold-deep)); box-shadow:0 10px 24px rgba(242,169,58,.4), inset 0 1px 0 rgba(255,255,255,.5); }
  .btn-cta:active { transform:translateY(2px); box-shadow:0 5px 14px rgba(242,169,58,.4); }
  .btn-ghost { font-size:15px; color:var(--ink); background:rgba(255,255,255,.08); border:1px solid rgba(150,170,220,.24); }
  .btn-ghost:active { transform:translateY(2px); background:rgba(255,255,255,.14); }

  /* ── Champion pill + full leaderboard ── */
  #lb { position:fixed; top:max(20px,calc(env(safe-area-inset-top) + 8px)); right:12px; z-index:6; pointer-events:auto; display:none; }
  #lb.show { display:block; }
  .lbrow { display:flex; align-items:center; gap:7px; background:var(--glass); -webkit-backdrop-filter:var(--blur); backdrop-filter:var(--blur); border:1px solid var(--glass-border); box-shadow:0 8px 20px rgba(0,0,0,.4); border-radius:999px; padding:5px 14px 5px 6px; font-weight:700; font-size:15px; color:var(--ink); line-height:1; cursor:pointer; -webkit-tap-highlight-color:transparent; transition:transform .12s ease; }
  .lbrow:active { transform:scale(.96); }
  .lbrow .crown { width:16px; height:16px; flex:0 0 auto; display:block; }
  .lbrow .crown path { fill:var(--gold); stroke:rgba(120,80,10,.5); stroke-width:1.2; stroke-linejoin:round; }
  .lbrow .av, .lbrow .avf { width:25px; height:25px; border-radius:50%; border:1.5px solid rgba(255,255,255,.5); box-shadow:0 1px 4px rgba(0,0,0,.4); flex:0 0 auto; display:block; object-fit:cover; }
  .lbrow .avf { background:linear-gradient(150deg, var(--gold), var(--gold-deep)); color:#0c1322; display:flex; align-items:center; justify-content:center; font-size:12px; font-weight:800; }
  .lbrow .nm { max-width:66px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
  .lbrow .sc { color:var(--gold); font-weight:800; font-variant-numeric:tabular-nums; }
  .lbrow.me .nm { color:var(--gold); }

  #lbFull { position:fixed; inset:0; display:none; z-index:40; padding:22px; align-items:center; justify-content:center; background:rgba(6,10,20,.62); -webkit-backdrop-filter:blur(4px); backdrop-filter:blur(4px); pointer-events:auto; }
  #lbFull.show { display:flex; animation:cc-fade .25s ease; }
  #lbFull .lcard { background:var(--glass-strong); -webkit-backdrop-filter:var(--blur); backdrop-filter:var(--blur); border:1px solid var(--glass-border); border-radius:24px; width:100%; max-width:380px; max-height:84vh; display:flex; flex-direction:column; padding:22px 18px 18px; box-shadow:var(--glass-shadow), 0 24px 60px rgba(0,0,0,.55); animation:cc-rise .34s cubic-bezier(.2,1.1,.4,1); }
  #lbFull h2 { font-weight:900; font-size:23px; color:#fff; margin:0 0 6px; text-align:center; text-transform:uppercase; letter-spacing:.01em; }
  #lbFull .lsub { text-align:center; font-weight:600; font-size:11px; letter-spacing:.18em; color:var(--ink-soft); text-transform:uppercase; margin:0 0 16px; }
  #lblist { display:flex; flex-direction:column; gap:8px; overflow-y:auto; -webkit-overflow-scrolling:touch; padding:2px; }
  .lfrow { display:flex; align-items:center; gap:11px; border:1px solid rgba(150,170,220,.18); border-radius:15px; background:rgba(255,255,255,.05); padding:9px 14px 9px 11px; cursor:pointer; font-weight:700; font-size:16px; color:var(--ink); line-height:1; -webkit-tap-highlight-color:transparent; transition:transform .12s ease, background .2s ease; }
  .lfrow:active { transform:scale(.985); background:rgba(255,255,255,.1); }
  .lfrow .rk { font-size:14px; min-width:30px; text-align:center; color:var(--ink-soft); font-weight:800; }
  .lfrow .av, .lfrow .avf { width:34px; height:34px; border-radius:50%; border:1.5px solid rgba(255,255,255,.5); box-shadow:0 1px 5px rgba(0,0,0,.4); flex:0 0 auto; display:block; object-fit:cover; }
  .lfrow .avf { background:linear-gradient(150deg, var(--gold), var(--gold-deep)); color:#0c1322; display:flex; align-items:center; justify-content:center; font-size:15px; font-weight:800; }
  .lfrow .nm { flex:1; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
  .lfrow .sc { color:var(--gold); font-weight:800; font-variant-numeric:tabular-nums; }
  .lfrow.me { background:linear-gradient(150deg, rgba(255,206,74,.22), rgba(242,169,58,.14)); border-color:rgba(255,206,74,.4); }
  .lfrow.me .nm, .lfrow.me .rk { color:var(--gold); }
  #lbClose { margin-top:16px; align-self:stretch; min-height:46px; border:none; border-radius:999px; background:rgba(255,255,255,.08); border:1px solid rgba(150,170,220,.24); color:var(--ink); font-family:var(--font); font-weight:800; font-size:16px; letter-spacing:.04em; cursor:pointer; -webkit-tap-highlight-color:transparent; text-transform:uppercase; transition:transform .12s ease, background .2s ease; }
  #lbClose:active { transform:translateY(2px); background:rgba(255,255,255,.14); }

  @media (prefers-reduced-motion: reduce) {
    #guide .g-finger, #guide .g-ripple { animation:none; }
    #guide .g-finger { transform:translateY(0); }
    #over.show, #over .card, #lbFull.show, #lbFull .lcard, #score.bump, #combo.pop, #title.pop { animation:none; }
  }
</style>
</head>
<body>
<div id="wrap">
  <canvas id="c"></canvas>
  <div id="wordmark" class="hud"><span class="b">Corporate<br>Climb</span><span class="sub">tap to climb · stomp to rise</span></div>
  <div id="score" class="hud">0</div>
  <div id="title" class="hud">INTERN</div>
  <div id="combo" class="hud"></div>
  <div id="pop" class="hud"><span class="m"></span><span class="s"></span></div>
  <div id="guide" class="hud">
    <div class="g-finger">
      <span class="g-ripple"></span>
      <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M9 11.24V7.5C9 6.12 10.12 5 11.5 5S14 6.12 14 7.5v3.74c1.21-.81 2-2.18 2-3.74C16 5.01 13.99 3 11.5 3S7 5.01 7 7.5c0 1.56.79 2.93 2 3.74zm9.84 4.63l-4.54-2.26c-.17-.07-.35-.11-.54-.11H13v-6c0-.83-.67-1.5-1.5-1.5S10 6.67 10 7.5v10.74l-3.43-.72c-.08-.01-.15-.03-.24-.03-.31 0-.59.13-.79.33l-.79.8 4.94 4.94c.27.27.65.44 1.06.44h6.79c.75 0 1.33-.55 1.44-1.28l.75-5.27c.01-.07.02-.14.02-.2 0-.62-.38-1.16-.92-1.38z"/></svg>
    </div>
    <div class="g-label">Tap to climb</div>
  </div>
  <div id="lb"></div>
</div>

<div id="lbFull">
  <div class="lcard">
    <h2>The Corner Office</h2>
    <p class="lsub">Highest climbers</p>
    <div id="lblist"></div>
    <button id="lbClose">Close</button>
  </div>
</div>

<div id="over">
  <div class="card">
    <p class="pink">Pink slip delivered</p>
    <h1>Laid Off</h1>
    <p class="reached">You made it to <b id="finalTitle">INTERN</b></p>
    <div class="rows">
      <div class="stat"><span class="k">Floor</span><span class="v" id="finalScore">0</span></div>
      <div class="stat best"><span class="k">Best</span><span class="v" id="finalBest">0</span></div>
    </div>
    <div class="btns">
      <button class="btn-cta" id="again">Climb again</button>
      <button class="btn-ghost" id="overRank">View ranking</button>
    </div>
  </div>
</div>

<script type="module">
import { startGame } from './game.js';

const $ = (s) => document.querySelector(s);
const canvas = $('#c');
const wordmarkEl = $('#wordmark');
const scoreEl = $('#score');
const titleEl = $('#title');
const comboEl = $('#combo');
const popEl = $('#pop');
const popMainEl = popEl.querySelector('.m');
const popSubEl = popEl.querySelector('.s');
const guideEl = $('#guide');
const overEl = $('#over');

let started = false;
let comboPopT = null, bumpT = null, titlePopT = null;

let preRunBest = 0;
function snapshotPreRunBest(){
  const A = window.Aigram;
  const meId = A && String(A.telegramId);
  if (meId && lbData.rows.length){
    const me = lbData.rows.find(r => String(r.user_id) === meId);
    preRunBest = me ? Number(me.score) || 0 : 0;
  } else preRunBest = 0;
}

function enterPlay(){
  if (started) return;
  started = true;
  snapshotPreRunBest();
  wordmarkEl.classList.add('hidden');
  guideEl.classList.remove('show');
  scoreEl.classList.add('show');
  titleEl.classList.add('show');
}

const hud = {
  setScore(n){
    scoreEl.textContent = String(n);
    scoreEl.classList.remove('bump'); void scoreEl.offsetWidth; scoreEl.classList.add('bump');
    clearTimeout(bumpT); bumpT = setTimeout(() => scoreEl.classList.remove('bump'), 320);
  },
  setTitle(t){
    titleEl.textContent = t;
    titleEl.classList.remove('pop'); void titleEl.offsetWidth; titleEl.classList.add('pop');
    clearTimeout(titlePopT); titlePopT = setTimeout(() => titleEl.classList.remove('pop'), 440);
  },
  setCombo(n){
    if (n >= 2){
      comboEl.textContent = '×' + n + ' COMBO';
      comboEl.classList.add('show', 'pop');
      clearTimeout(comboPopT); comboPopT = setTimeout(() => comboEl.classList.remove('pop'), 340);
    } else comboEl.classList.remove('show');
  },
  setDead(payload){
    if (!payload){
      overEl.classList.remove('show');
      started = false;
      wordmarkEl.classList.remove('hidden');
      scoreEl.classList.remove('show');
      titleEl.classList.remove('show');
      comboEl.classList.remove('show');
      scoreEl.textContent = '0';
      titleEl.textContent = 'INTERN';
      guideEl.classList.add('show');
      return;
    }
    $('#finalScore').textContent = String(payload.score);
    $('#finalBest').textContent = String(payload.best);
    $('#finalTitle').textContent = payload.title || 'INTERN';
    overEl.classList.add('show');
    trySendBeatNotify(payload.score);
    setTimeout(refreshLB, 1200);
  },
  setReady(on){ guideEl.classList.toggle('show', on !== false && !started); },
  pop(text, tone, sub){
    popMainEl.textContent = text;
    popSubEl.textContent = sub || '';
    popEl.classList.remove('go', 'tone-perfect', 'tone-good', 'tone-miss', 'tone-promote');
    void popEl.offsetWidth;
    popEl.classList.add('go', 'tone-' + (tone || 'perfect'));
  },
};

const api = startGame({ canvas, hud });

// ── Tap input — tap anywhere to climb ──
addEventListener('pointerdown', (e) => {
  if (overEl.classList.contains('show')) return;
  if (e.target.closest('#lb, #lbFull')) return;
  enterPlay();
  api.startHop();
}, { passive:true });

$('#again').addEventListener('click', () => api.restart());
$('#overRank').addEventListener('click', openLbFull);

// ── Champion pill + full leaderboard ──
const lbEl = $('#lb');
const lbFullEl = $('#lbFull');
const lblistEl = $('#lblist');
let lbData = { rows:[], meId:'' };

function lbInitial(name){
  const d = document.createElement('span');
  d.className = 'avf';
  d.textContent = ((name || '?').trim().charAt(0) || '?').toUpperCase();
  return d;
}
function lbAvatar(r){
  if (r.head_url){
    const img = document.createElement('img');
    img.className = 'av'; img.src = r.head_url; img.alt = ''; img.draggable = false;
    img.onerror = () => img.replaceWith(lbInitial(r.user_name));
    return img;
  }
  return lbInitial(r.user_name);
}
function lbChampionPill(r, isMe){
  const row = document.createElement('div');
  row.className = 'lbrow' + (isMe ? ' me' : '');
  row.innerHTML = '<svg class="crown" viewBox="0 0 24 24"><path d="M3 18 L2 7 L8 12 L12 4 L16 12 L22 7 L21 18 Z"/></svg>';
  row.appendChild(lbAvatar(r));
  const nm = document.createElement('span');
  let name = (r.user_name || '?').trim();
  if (name.length > 8) name = name.slice(0, 8) + '…';
  nm.className = 'nm'; nm.textContent = isMe ? 'YOU' : name;
  row.appendChild(nm);
  const sc = document.createElement('span');
  sc.className = 'sc'; sc.textContent = String(Number(r.score) || 0);
  row.appendChild(sc);
  row.addEventListener('click', openLbFull);
  return row;
}
function lbFullRow(r, isMe){
  const row = document.createElement('div');
  row.className = 'lfrow' + (isMe ? ' me' : '');
  const rk = document.createElement('span');
  rk.className = 'rk'; rk.textContent = '#' + r.rank;
  row.appendChild(rk);
  row.appendChild(lbAvatar(r));
  const nm = document.createElement('span');
  nm.className = 'nm'; nm.textContent = isMe ? 'YOU' : (r.user_name || '?');
  row.appendChild(nm);
  const sc = document.createElement('span');
  sc.className = 'sc'; sc.textContent = String(Number(r.score) || 0);
  row.appendChild(sc);
  if (!isMe && r.user_id){
    row.addEventListener('click', () => window.Aigram && window.Aigram.openAigramProfile(r.user_id));
  }
  return row;
}
function openLbFull(){
  lblistEl.innerHTML = '';
  for (const r of lbData.rows) lblistEl.appendChild(lbFullRow(r, String(r.user_id) === lbData.meId));
  lbFullEl.classList.add('show');
  refreshLB();
}
$('#lbClose').addEventListener('click', () => lbFullEl.classList.remove('show'));

function renderLB(rows, meId){
  if (!rows.length){ lbEl.classList.remove('show'); return; }
  rows = rows.slice().sort((a, b) => (a.rank || 999) - (b.rank || 999));
  lbData = { rows, meId };
  lbEl.innerHTML = '';
  lbEl.appendChild(lbChampionPill(rows[0], String(rows[0].user_id) === meId));
  lbEl.classList.add('show');
}
window.__lbRender = renderLB;

async function refreshLB(){
  const A = window.Aigram;
  if (!A || !A.canRank) return;
  try {
    const res = await A.callAigramAPI('/note/aigram/ai/game/rank/score/list/by/session_id?session_id=' + A.gameUuid, 'GET');
    const rows = Array.isArray(res) ? res : (res && res.data) || [];
    renderLB(rows, String(A.telegramId));
  } catch (e) {}
}

async function trySendBeatNotify(myScore){
  const A = window.Aigram;
  if (!A || !A.canRank || !A.telegramId) return;
  if (myScore <= preRunBest) return;
  try {
    const res = await A.callAigramAPI('/note/aigram/ai/game/rank/score/list/by/session_id?session_id=' + A.gameUuid, 'GET');
    const rows = Array.isArray(res) ? res : (res && res.data) || [];
    const meId = String(A.telegramId);
    const beaten = rows
      .filter(r => String(r.user_id) !== meId)
      .map(r => ({ id: String(r.user_id), score: Number(r.score) || 0 }))
      .filter(r => r.score < myScore && r.score > preRunBest)
      .sort((a, b) => b.score - a.score)[0];
    if (!beaten) return;
    A.postAigramAPI('/note/aigram/ai/game/record/play', {
      session_id: A.gameUuid,
      event: 'score_beat',
      config_json: { actions: [{
        type: 'notify',
        target_user_id: beaten.id,
        image: {
          ref_url: 'https://yinxinghuan.github.io/games/posters/corporate-climb.png',
          prompt: 'A voxel office worker mid-leap up a corporate tower of desks at dusk, stomping a rival, gold executive glow.',
        },
        message: {
          template: '{sender_name} just got promoted past you — floor ' + Math.round(myScore) + ' on Corporate Climb.',
          variables: ['sender_name'],
        },
      }] },
    });
  } catch (e) {}
}

refreshLB();
</script>
</body>
</html>
